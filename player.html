<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Player</title>

  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
    }

    embed {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>

<body>
  <div id="game-container">
    <embed id="flash-game">
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const game = params.get("game");

    const player = document.getElementById("flash-game");

    if (game) {
      player.src = "games/" + game;
    } else {
      document.body.innerHTML = "<h1 style='color:white;font-family:Arial;'>No game selected</h1>";
    }
  </script>
</body>
</html>
