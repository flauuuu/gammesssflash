<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Player</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #game-container {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 4 / 3;
    }

    embed, ruffle-player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <embed id="flash-game">
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const game = params.get("game");

    if (game) {
      document.getElementById("flash-game").src = "games/" + game;
    } else {
      document.body.innerHTML = "<h1 style='color:white;'>No game selected.</h1>";
    }
  </script>
</body>
</html>
